
# WebHunter Pro - Production Nginx Configuration
# Optimized for Next.js 15, Socket.IO, and BullMQ Telemetry

server {
    listen 80;
    server_name your-domain.com; # Replace with your actual domain or IP

    # Root directory for static assets if needed
    # root /var/www/webhunter/public;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/xml text/css application/x-javascript application/json;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.(?!.*SV1)";

    # Proxy headers for all requests
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Next.js Application & Socket.IO
    location / {
        proxy_pass http://localhost:3000;
        
        # Buffer settings for high-throughput responses
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Timeouts for long-running scraping telemetry
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Explicit Socket.IO handling
    location /socket.io/ {
        proxy_pass http://localhost:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Error pages
    error_page 502 /502.html;
    location = /502.html {
        root /usr/share/nginx/html;
        internal;
    }
}
