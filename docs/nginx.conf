
# WebHunter Pro - Production Nginx Configuration (Hardened)
# Optimized for Next.js 15, Socket.IO, and Enterprise Security

# Rate Limiting Zones
limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

server {
    listen 80;
    server_name your-domain.com; # Replace with your actual domain or IP

    # Redirect all HTTP traffic to HTTPS (Enable after setting up Certbot)
    # return 301 https://$host$request_uri;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/xml text/css application/x-javascript application/json;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.(?!.*SV1)";

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: blob:; font-src 'self' https: data:; connect-src 'self' https: wss:;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Proxy headers for all requests
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Next.js Application
    location / {
        limit_req zone=one burst=20 nodelay;
        proxy_pass http://localhost:3000;
        
        # Buffer settings for high-throughput responses
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Timeouts for long-running scraping telemetry
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Explicit Socket.IO handling
    location /socket.io/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://localhost:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Deny access to .env and other sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
